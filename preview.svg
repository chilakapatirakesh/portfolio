<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030508"/>
      <stop offset="100%" style="stop-color:#0d1520"/>
    </linearGradient>
    <linearGradient id="cyan-gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c8ff"/>
      <stop offset="100%" style="stop-color:#d4a843"/>
    </linearGradient>
    <linearGradient id="name-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00c8ff"/>
      <stop offset="60%" style="stop-color:#7fd8f0"/>
      <stop offset="100%" style="stop-color:#d4a843"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="rgba(0,200,255,0.04)" stroke-width="1">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1140" y1="0" x2="1140" y2="630"/>
  </g>

  <!-- Glow orb left -->
  <ellipse cx="200" cy="315" rx="300" ry="250" fill="rgba(0,200,255,0.05)"/>
  <!-- Glow orb right -->
  <ellipse cx="1000" cy="315" rx="250" ry="200" fill="rgba(212,168,67,0.04)"/>

  <!-- Left accent bar -->
  <rect x="80" y="160" width="3" height="310" fill="url(#cyan-gold)" rx="2"/>

  <!-- Shield icon area -->
  <g transform="translate(900, 200)">
    <polygon points="115,0 220,50 220,160 115,220 10,160 10,50"
             fill="none" stroke="rgba(0,200,255,0.2)" stroke-width="1.5"/>
    <polygon points="115,20 200,63 200,155 115,205 30,155 30,63"
             fill="none" stroke="rgba(0,200,255,0.1)" stroke-width="1"/>
    <text x="115" y="128" font-family="Arial Black,sans-serif" font-size="52"
          text-anchor="middle" fill="rgba(0,200,255,0.35)" font-weight="900">RC</text>
  </g>

  <!-- Top label -->
  <text x="110" y="148" font-family="monospace" font-size="13" fill="rgba(0,200,255,0.5)" letter-spacing="4">// CYBERSECURITY ANALYST</text>

  <!-- Main name RAKESH -->
  <text x="108" y="285" font-family="Arial Black,sans-serif" font-size="96"
        font-weight="900" fill="#e8edf5" letter-spacing="-2">RAKESH</text>

  <!-- Main name CHILAKAPATI with gradient simulation -->
  <text x="108" y="390" font-family="Arial Black,sans-serif" font-size="96"
        font-weight="900" fill="url(#name-grad)" letter-spacing="-2">CHILAKAPATI</text>

  <!-- Divider line -->
  <rect x="108" y="415" width="500" height="2" fill="url(#cyan-gold)" rx="1"/>

  <!-- Tagline -->
  <text x="108" y="460" font-family="monospace" font-size="18"
        fill="rgba(136,153,170,0.9)" letter-spacing="1">Application Security  ·  Threat Hunting  ·  SOC Operations</text>

  <!-- Stats row -->
  <g font-family="monospace" font-size="14" fill="rgba(136,153,170,0.7)">
    <text x="108" y="510">
      <tspan fill="#00c8ff" font-size="20" font-family="Arial Black,sans-serif">Top 1%</tspan>
      <tspan dx="6">TryHackMe</tspan>
    </text>
    <text x="340" y="510">
      <tspan fill="#d4a843" font-size="20" font-family="Arial Black,sans-serif">SC-200</tspan>
      <tspan dx="6">Microsoft Certified</tspan>
    </text>
    <text x="620" y="510">
      <tspan fill="#00c8ff" font-size="20" font-family="Arial Black,sans-serif">3+</tspan>
      <tspan dx="6">Years Experience</tspan>
    </text>
  </g>

  <!-- Bottom location -->
  <text x="108" y="565" font-family="monospace" font-size="14"
        fill="rgba(68,85,102,0.9)" letter-spacing="2">📍 HYDERABAD, INDIA</text>

  <!-- Top-right corner bracket -->
  <g stroke="rgba(0,200,255,0.2)" stroke-width="1.5" fill="none">
    <polyline points="1140,30 1170,30 1170,60"/>
    <polyline points="30,600 30,570 60,570"/>
  </g>
</svg>